<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal | Adosa Groundwater</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">

    <header class="bg-blue-900 text-white p-6 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight">ADOSA <span class="text-blue-300">PORTAL</span></h1>
            <a href="index.html" class="text-sm hover:text-blue-300">← Back to Site</a>
        </div>
    </header>

    <section class="py-20 container mx-auto px-6 max-w-2xl text-center">
        <h2 class="text-3xl font-bold text-blue-900 mb-4">Access Your Survey Report</h2>
        <p class="text-slate-600 mb-8">Enter your full name as it appears on your contract to download your PDF report.</p>

        <div class="bg-white p-2 rounded-full shadow-lg border flex items-center">
            <input id="clientSearch" type="text" placeholder="e.g. Boitshwarelo Joseph" class="w-full p-4 rounded-full focus:outline-none px-6">
            <button onclick="findReport()" class="bg-blue-600 text-white px-8 py-4 rounded-full font-bold hover:bg-blue-700 transition">
                Search
            </button>
        </div>
        
        <div id="resultArea" class="mt-10 hidden">
            <div class="bg-green-50 border border-green-200 p-6 rounded-xl inline-block">
                <p class="text-green-800 font-medium mb-3">Report Found!</p>
                <a id="downloadLink" href="#" target="_blank" class="bg-green-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-green-700">
                    Download PDF Report
                </a>
            </div>
        </div>

        <p id="errorArea" class="mt-10 text-red-500 hidden text-sm font-medium">
            No report found. Please check the spelling or contact support at +267 73830945.
        </p>
    </section>

    <script>
        function findReport() {
            const name = document.getElementById('clientSearch').value.toLowerCase().trim().replace(/\s+/g, '-');
            const resultArea = document.getElementById('resultArea');
            const errorArea = document.getElementById('errorArea');
            const downloadLink = document.getElementById('downloadLink');

            // This logic assumes your PDF is named exactly "report-name-name.pdf"
            // Example: report-boitshwarelo-joseph.pdf
            const reportPath = `reports/report-${name}.pdf`;

            // On GitHub Pages, we check if the file exists by trying to fetch it
            fetch(reportPath, { method: 'HEAD' })
                .then(res => {
                    if (res.ok) {
                        downloadLink.href = reportPath;
                        resultArea.classList.remove('hidden');
                        errorArea.classList.add('hidden');
                    } else {
                        resultArea.classList.add('hidden');
                        errorArea.classList.remove('hidden');
                    }
                })
                .catch(() => {
                    resultArea.classList.add('hidden');
                    errorArea.classList.remove('hidden');
                });
        }
    </script>
</body>
</html>
